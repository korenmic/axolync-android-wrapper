name: Android CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clone axolync-browser (authenticated)
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/korenmic/axolync-browser.git" browser-src

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build axolync-browser
      run: |
        cd browser-src
        npm ci
        npm run build
        cd ..
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Run unit tests
      env:
        AXOLYNC_BUILDER_BROWSER_NORMAL: ${{ github.workspace }}/browser-src/dist
      run: ./gradlew test --console=plain
    
    - name: Run lint
      env:
        AXOLYNC_BUILDER_BROWSER_NORMAL: ${{ github.workspace }}/browser-src/dist
      run: ./gradlew lint --console=plain
      continue-on-error: true
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: app/build/test-results/
    
    - name: Upload lint results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: app/build/reports/lint-results*.html

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clone axolync-browser (authenticated)
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/korenmic/axolync-browser.git" browser-src

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build axolync-browser
      run: |
        cd browser-src
        npm ci
        npm run build
        cd ..
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build debug APK variants
      env:
        AXOLYNC_BUILDER_BROWSER_NORMAL: ${{ github.workspace }}/browser-src/dist
      run: ./gradlew :app:assembleNormalDebug :app:assembleDemoDebug --console=plain

    - name: Upload debug APKs
      uses: actions/upload-artifact@v4
      with:
        name: debug-apks
        path: app/build/outputs/apk/**/**/*.apk
